{% load static %}
<!doctype html>
<html lang="en-US">
  <head>
    {{board_view_dto|json_script:"board-view-dto" }}
    {{solution_view_dto|json_script:"solution-view-dto" }}
    <link rel="stylesheet" href="{% static 'crossword/style.css' %}">
    <script type="module" src="{% static 'crossword/dist/main.js' %}"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title></title>
  </head>
  <body class="off-white">
    <header class="site-header">
      <nav>
        <a href="/" class="site-name">CS Trivia</a>
        <a href="https://github.com/JuliusBoateng/cs-trivia" target="_blank" rel="noopener noreferrer">
          GitHub
        </a>
      </nav>
    </header>
    <div class="main">
      <article class="puzzle">
      <h1 class="board-title"></h1>
      <div class="board-help">
        <p>Select a cell • Double-click to switch direction • Arrow keys to move</p>
      </div>
        <div class = "puzzle-panel">
          <div class="board-wrapper">
            <table id="board" class="board-card"></table>
          </div>
          <div class="clue-wrapper">
            <div id="clues" class="clue-card">
              <h2>
                <button id="todo-toggle" type="button" class="clue-toggle section-toggle" aria-expanded="true" aria-controls="todo-section">
                  <span class="clue-label">To Do</span>
                  <span class="clue-count"></span>
                </button>
              </h2>
              <div id="todo-section" class="clue-section-body">
                <h3>
                  <button id="todo-across-toggle" type="button" class="clue-toggle" aria-expanded="false" aria-controls="todo-across-clues">
                    <span class="clue-label">Across</span>
                    <span class="clue-count"></span>
                  </button>
                </h3>
                <ol id="todo-across-clues" class="clue-list" hidden></ol>
                <h3>
                  <button id="todo-down-toggle" type="button" class="clue-toggle" aria-expanded="false" aria-controls="todo-down-clues">
                    <span class="clue-label">Down</span>
                    <span class="clue-count"></span>
                  </button>
                </h3>
                <ol id="todo-down-clues" class="clue-list" hidden></ol>
              </div>
              <h2>
                <button id="solved-toggle" type="button" class="clue-toggle section-toggle" aria-expanded="false" aria-controls="solved-section">
                  <span class="clue-label">Solved</span>
                  <span class="clue-count"></span>
                </button>
              </h2>
              <div id="solved-section" class="clue-section-body" hidden>
                <h3>
                  <button id="solved-across-toggle" type="button" class="clue-toggle" aria-expanded="false" aria-controls="solved-across-clues">
                    <span class="clue-label">Across</span>
                    <span class="clue-count"></span>
                  </button>
                </h3>
                <ol id="solved-across-clues" class="clue-list" hidden></ol>
                <h3>
                  <button id="solved-down-toggle" type="button" class="clue-toggle" aria-expanded="false" aria-controls="solved-down-clues">
                    <span class="clue-label">Down</span>
                    <span class="clue-count"></span>
                  </button>
                </h3>
                <ol id="solved-down-clues" class="clue-list" hidden></ol>
              </div>
              <div class="clue-empty">No clues visible</div>
            </div>
          </div>
        </div>
        <section class="board-desc">
          <p></p>
        </section>
        <details class="solution-panel">
          <summary class="solution-toggle">solution.txt</summary>
          <pre class="solution-json"><code></code></pre>
        </details>
        <footer class="puzzle-metadata">
          <p class="meta-line">
            <span class="author"></span>
            <time class="published-at"></time>
            <span class="puzzle-number"></span>
          </p>
        </footer>
      </article>
    </div>
    <footer class="site-footer">
      <p>
        Open Source on 
        <a href="https://github.com/JuliusBoateng/cs-trivia" target="_blank" rel="noopener noreferrer">
          GitHub
        </a>
      </p>
    </footer>
  </body>
</html>
