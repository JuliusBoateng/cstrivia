{% load static %}
<!doctype html>
<html lang="en-US">
  <head>
    {{board_view_dto|json_script:"board-view-dto" }}
    {{solution_view_dto|json_script:"solution-view-dto" }}
    <link rel="stylesheet" href="{% static 'crossword/style.css' %}">
    <script type="module" src="{% static 'crossword/dist/main.js' %}"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Crossword</title>
  </head>
  <body class="off-white">
    <div class="main">
      <h1>Crossword</h1>
        <div class = "panel">
          <div class="board-wrapper">
            <table id="board" class="board-card"></table>
          </div>
          <div id="clues" class="clue-wrapper">
            <h2>
              <button id="todo-toggle" type="button" class="clue-toggle" aria-expanded="true" aria-controls="todo-section">
                To Do
              </button>
            </h2>
            <div id="todo-section" class="clue-section-body">
              <h3>
                <button type="button" class="clue-toggle" aria-expanded="true" aria-controls="todo-across-clues">
                  Across
                </button>
              </h3>
              <ol class="clue-list" id="todo-across-clues"></ol>
              <h3>
                <button type="button" class="clue-toggle" aria-expanded="true" aria-controls="todo-down-clues">
                  Down
                </button>
              </h3>
              <ol class="clue-list" id="todo-down-clues"></ol>
            </div>
            <h2>
              <button id="solved-toggle" type="button" class="clue-toggle" aria-expanded="false" aria-controls="solved-section">
                Solved
              </button>
            </h2>
            <div id="solved-section" class="clue-section-body" hidden>
              <h3>
                <button type="button" class="clue-toggle" aria-expanded="false" aria-controls="solved-across-clues">
                  Across
                </button>
              </h3>
              <ol class="clue-list" id="solved-across-clues" hidden></ol>
              <h3>
                <button type="button" class="clue-toggle" aria-expanded="false" aria-controls="solved-down-clues">
                  Down
                </button>
              </h3>
              <ol class="clue-list" id="solved-down-clues" hidden></ol>
            </div>
          </div>
        </div>
    </div>
  </body>
</html>
