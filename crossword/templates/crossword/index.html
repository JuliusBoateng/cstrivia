{% load static %}
<!doctype html>
<html lang="en-US">
  <head>
    {{board_view_dto|json_script:"board-view-dto" }}
    {{solution_view_dto|json_script:"solution-view-dto" }}
    <link rel="stylesheet" href="{% static 'crossword/style.css' %}">
    <script type="module" src="{% static 'crossword/dist/main.js' %}"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Crossword</title>
  </head>
  <body class="off-white">
    <div class="main">
      <h1>Crossword</h1>
        <div class = "panel">
          <div class="board-wrapper">
            <table id="board" class="board-card"></table>
          </div>
          <div id="clues" class="clue-wrapper">
            <details open>
              <summary>To Do</summary>
          
              <details open>
                <summary>Across</summary>
                <ol id="across-clues"></ol>
              </details>
          
              <details open>
                <summary>Down</summary>
                <ol id="down-clues"></ol>
              </details>
            </details>
            <details>
              <summary>Solved</summary>
                <details open>
                  <summary>Across</summary>
                  <ol id="solved-across-clues"></ol>
                </details>
                <details open>
                  <summary>Down</summary>
                  <ol id="solved-down-clues"></ol>
                </details>
            </details>
          </div>
        </div>
    </div>
  </body>
</html>
