<div class="design-list">
    <ul>
        {% for note in notes %}
            <li>
                <a href="{% url 'design_note' note.design_number %}" class="design-row">
                    <span class="design-number">Design {{ note.design_number }}:</span>
                    <span class="design-title">{{ note.title }}</span>
                    <span class="design-date">{{ note.published_at|date:"M j, Y" }}</span>
                </a>
            </li>
        {% endfor %}
    </ul>
</div>
{% include "crossword/includes/_pagination.html" %}
